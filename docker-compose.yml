version: '3.8'
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80" # Map host port 4200 to container port 80 (Nginx)
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080" # Map host port 8080 to container port 8080 (Gin)
    env_file:
      - .env # Load environment variables from .env file
    environment:
      - GIN_MODE=${GIN_MODE:-release} # Uses GIN_MODE from .env if set, otherwise defaults to 'release'
    depends_on:
      - mongo # Or remove if connecting directly to Atlas and not running a local mongo instance
    restart: unless-stopped
    networks:
      - app-network

  mongo:
    image: mongo:7.0 # Using MongoDB 7.0 as 8.x specific images might not be GA; adjust if needed.
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
