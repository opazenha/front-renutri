<div class="register-container">
  <h2>Register</h2>
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>

    <div class="form-field">
      <label for="name">Full Name</label>
      <input id="name" type="text" formControlName="name" placeholder="Your Full Name">
      <div *ngIf="name && name.invalid && (name.dirty || name.touched)" class="error-message">
        <small *ngIf="name.errors?.['required']">Name is required.</small>
      </div>
    </div>

    <div class="form-field">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="your@email.com">
      <div *ngIf="email && email.invalid && (email.dirty || email.touched)" class="error-message">
        <small *ngIf="email.errors?.['required']">Email is required.</small>
        <small *ngIf="email.errors?.['email']">Please enter a valid email address.</small>
      </div>
    </div>

    <div class="form-field">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" placeholder="Choose a strong password">
      <div *ngIf="password && password.invalid && (password.dirty || password.touched)" class="error-message">
        <small *ngIf="password.errors?.['required']">Password is required.</small>
        <small *ngIf="password.errors?.['minlength']">Password must be at least 6 characters long.</small>
      </div>
    </div>

    <div class="form-field">
      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="Confirm your password">
      <div *ngIf="confirmPassword && confirmPassword.invalid && (confirmPassword.dirty || confirmPassword.touched)" class="error-message">
        <small *ngIf="confirmPassword.errors?.['required']">Confirming password is required.</small>
      </div>
      <div *ngIf="registerForm.errors?.['mismatch'] && confirmPassword && (confirmPassword.dirty || confirmPassword.touched)" class="error-message">
        <small>Passwords do not match.</small>
      </div>
    </div>

    <div *ngIf="successMessage" class="success-message">
      {{ successMessage }}
    </div>
    
    <div *ngIf="errorMessage && !successMessage" class="error-message server-error">
      {{ errorMessage }}
    </div>

    <button type="submit" [disabled]="registerForm.invalid || isLoading">
      <span *ngIf="!isLoading">Register</span>
      <span *ngIf="isLoading">Registering...</span>
    </button>

    <div class="links">
        <p>Already have an account? <a routerLink="/login">Login here</a></p>
    </div>

  </form>
</div>
